<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Turbo Panther">
<title>Turbo Panther Controller</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --panel: #16161f;
    --border: #2a2a3a;
    --accent: #00e5ff;
    --accent2: #ff3d00;
    --green: #00ff88;
    --yellow: #ffd600;
    --text: #e0e0f0;
    --muted: #6060a0;
    --font: 'Rajdhani', sans-serif;
    --mono: 'Share Tech Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Grid lines background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── TOP BAR ── */
  #topbar {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #topbar .logo {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }
  #topbar .logo span { color: var(--accent2); }

  #status-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.warn { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
  .status-label { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .status-label.on { color: var(--green); }
  .status-label.warn { color: var(--yellow); }

  /* ── TELEMETRY BAR ── */
  #telemetry {
    position: relative; z-index: 10;
    display: flex;
    justify-content: space-around;
    padding: 6px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .telem-item { text-align: center; }
  .telem-label { font-family: var(--mono); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .telem-value { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; }
  .telem-unit  { font-family: var(--mono); font-size: 9px; color: var(--muted); }

  /* ── MAIN ── */
  #main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    grid-template-rows: 1fr;
    gap: 0;
    padding: 12px 8px;
    position: relative;
    z-index: 10;
    min-height: 0;
  }

  /* ── JOYSTICK ── */
  .joystick-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 20px;
    gap: 10px;
  }
  .joystick-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: var(--mono);
  }
  .joystick-base {
    width: 140px; height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #1a1a28 0%, #0d0d18 100%);
    border: 2px solid var(--border);
    position: relative;
    cursor: none;
    box-shadow: 0 0 0 1px rgba(0,229,255,0.08), inset 0 2px 8px rgba(0,0,0,0.5);
  }
  .joystick-base::before {
    content: '';
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    border: 1px dashed rgba(0,229,255,0.08);
  }
  .joystick-thumb {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #3a3a5a 0%, #1a1a2a 100%);
    border: 2px solid var(--accent);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 12px rgba(0,229,255,0.3), 0 4px 8px rgba(0,0,0,0.5);
    transition: box-shadow 0.1s;
    pointer-events: none;
  }
  .joystick-thumb.active {
    box-shadow: 0 0 20px rgba(0,229,255,0.6), 0 4px 8px rgba(0,0,0,0.5);
    border-color: #80f0ff;
  }

  /* ── CENTER PANEL ── */
  #center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 0 8px;
    min-width: 90px;
  }

  .btn-action {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-family: var(--font);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 2px;
    transition: all 0.15s;
    user-select: none;
  }
  .btn-action svg { width: 18px; height: 18px; }
  .btn-action:active, .btn-action.pressed {
    background: rgba(0,229,255,0.15);
    border-color: var(--accent);
    box-shadow: 0 0 16px rgba(0,229,255,0.4);
    transform: scale(0.93);
  }
  .btn-horn { border-color: var(--yellow); color: var(--yellow); }
  .btn-horn:active { background: rgba(255,214,0,0.15); border-color: var(--yellow); box-shadow: 0 0 16px rgba(255,214,0,0.4); }
  .btn-stop { border-color: var(--accent2); color: var(--accent2); font-size: 9px; }
  .btn-stop:active { background: rgba(255,61,0,0.15); border-color: var(--accent2); box-shadow: 0 0 16px rgba(255,61,0,0.4); }

  #mode-display {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    text-align: center;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    background: rgba(0,229,255,0.05);
  }

  /* ── IP INPUT ── */
  #config-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }
  #config-panel.visible { transform: translateY(0); }
  #config-panel label { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
  #ip-input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
  }
  #ip-input:focus { border-color: var(--accent); }
  .btn-connect {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-family: var(--font);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-close {
    background: none; border: none; color: var(--muted);
    font-size: 20px; cursor: pointer; padding: 0 4px;
  }

  /* ── THROTTLE PROGRESS ── */
  #throttle-bar-wrap {
    position: absolute;
    right: 0; top: 10%; bottom: 20%;
    width: 6px;
    background: var(--panel);
    border-radius: 4px;
    overflow: visible;
  }
  #throttle-fill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(0deg, var(--accent2), var(--yellow), var(--green));
    border-radius: 4px;
    height: 0%;
    transition: height 0.08s;
  }

  /* ── DIRECTION INDICATOR ── */
  #dir-indicator {
    font-family: var(--mono);
    font-size: 22px;
    color: var(--accent);
    min-height: 30px;
    line-height: 1;
    text-shadow: 0 0 10px currentColor;
  }

  /* ── PS4 indicator ── */
  #ps4-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }
  #ps4-hint .icon { font-size: 36px; opacity: 0.15; }
  #ps4-hint .text { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 6px; }

  /* ── SETTINGS BUTTON ── */
  #btn-settings {
    background: none; border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px;
    color: var(--muted); cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
  }
  #btn-settings:hover { border-color: var(--accent); color: var(--accent); }

  /* ── STEERING BAR ── */
  #steering-indicator {
    position: absolute;
    bottom: 10px; left: 15%; right: 15%;
    height: 4px;
    background: var(--panel);
    border-radius: 2px;
  }
  #steering-cursor {
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 50%;
    position: absolute;
    top: -4px; left: calc(50% - 6px);
    box-shadow: 0 0 8px var(--accent);
    transition: left 0.05s;
  }

  /* Scan line effect */
  @keyframes scanline {
    0% { background-position: 0 0; }
    100% { background-position: 0 100vh; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">TURBO <span>PANTHER</span></div>
  <div id="status-row">
    <div class="dot" id="dot-ws"></div>
    <span class="status-label" id="lbl-ws">DÉCONNECTÉ</span>
    &nbsp;
    <div class="dot warn" id="dot-ps4"></div>
    <span class="status-label warn" id="lbl-ps4">PS4 --</span>
    <button id="btn-settings" onclick="toggleConfig()">⚙</button>
  </div>
</div>

<!-- TELEMETRY -->
<div id="telemetry">
  <div class="telem-item">
    <div class="telem-label">Vitesse</div>
    <div class="telem-value" id="t-speed">0</div>
    <div class="telem-unit">%</div>
  </div>
  <div class="telem-item">
    <div class="telem-label">Direction</div>
    <div class="telem-value" id="t-steer">0°</div>
    <div class="telem-unit">deg</div>
  </div>
  <div class="telem-item">
    <div class="telem-label">Mode</div>
    <div class="telem-value" id="t-mode" style="font-size:13px;padding-top:3px">NORMAL</div>
    <div class="telem-unit">&nbsp;</div>
  </div>
  <div class="telem-item">
    <div class="telem-label">Ping</div>
    <div class="telem-value" id="t-ping">--</div>
    <div class="telem-unit">ms</div>
  </div>
</div>

<!-- MAIN CONTROL AREA -->
<div id="main">
  <!-- LEFT JOYSTICK (throttle) -->
  <div class="joystick-wrap" id="left-wrap">
    <div id="dir-indicator">●</div>
    <div class="joystick-base" id="joystick-left">
      <div class="joystick-thumb" id="thumb-left"></div>
    </div>
    <div class="joystick-label">GAZ / FREIN</div>
  </div>

  <!-- CENTER -->
  <div id="center">
    <div id="mode-display" id="mode-txt">NORMAL</div>
    <button class="btn-action btn-horn" id="btn-horn" ontouchstart="sendCmd('horn',1)" ontouchend="sendCmd('horn',0)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9v6h4l5 5V4L7 9H3z"/>
        <path d="M16 9a5 5 0 0 1 0 6"/>
      </svg>
      KLAXON
    </button>
    <button class="btn-action btn-stop" id="btn-stop" onclick="emergencyStop()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
      </svg>
      STOP
    </button>
    <button class="btn-action" id="btn-mode" onclick="cycleMode()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
      </svg>
      MODE
    </button>
  </div>

  <!-- RIGHT JOYSTICK (steering) -->
  <div class="joystick-wrap" id="right-wrap">
    <div id="dir-indicator-r">●</div>
    <div class="joystick-base" id="joystick-right">
      <div class="joystick-thumb" id="thumb-right"></div>
    </div>
    <div class="joystick-label">DIRECTION</div>
  </div>
</div>

<!-- Steering bar -->
<div id="steering-indicator">
  <div id="steering-cursor"></div>
</div>

<!-- CONFIG PANEL -->
<div id="config-panel">
  <label>IP ESP:</label>
  <input id="ip-input" type="text" placeholder="192.168.4.1" value="192.168.4.1">
  <button class="btn-connect" onclick="connect()">CONNECT</button>
  <button class="btn-close" onclick="toggleConfig()">✕</button>
</div>

<script>
// ── STATE ──
let ws = null;
let wsConnected = false;
let throttle = 0;   // -100..100
let steering = 0;   // -100..100
let mode = 'NORMAL';
let modes = ['NORMAL','SPORT','ECO'];
let modeIdx = 0;
let sendInterval = null;
let lastSend = 0;
let pingStart = 0;

// ── JOYSTICK ──
function setupJoystick(baseId, thumbId, axis, onUpdate) {
  const base = document.getElementById(baseId);
  const thumb = document.getElementById(thumbId);
  const R = base.offsetWidth / 2 || 70;
  let dragging = false, startX, startY, cx = 0, cy = 0;

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

  function move(px, py) {
    const rect = base.getBoundingClientRect();
    const ox = px - rect.left - rect.width / 2;
    const oy = py - rect.top - rect.height / 2;
    const dist = Math.sqrt(ox * ox + oy * oy);
    const maxR = rect.width / 2 - 26;
    const scale = dist > maxR ? maxR / dist : 1;
    cx = ox * scale;
    cy = oy * scale;
    thumb.style.transform = `translate(calc(-50% + ${cx}px), calc(-50% + ${cy}px))`;
    thumb.classList.add('active');
    // normalize -100..100
    const nx = Math.round(cx / maxR * 100);
    const ny = Math.round(-cy / maxR * 100); // invert Y
    onUpdate(nx, ny);
  }

  function release() {
    dragging = false;
    cx = 0; cy = 0;
    thumb.style.transform = 'translate(-50%, -50%)';
    thumb.classList.remove('active');
    onUpdate(0, 0);
  }

  base.addEventListener('touchstart', e => {
    dragging = true;
    move(e.touches[0].clientX, e.touches[0].clientY);
    e.preventDefault();
  }, { passive: false });

  base.addEventListener('touchmove', e => {
    if (!dragging) return;
    move(e.touches[0].clientX, e.touches[0].clientY);
    e.preventDefault();
  }, { passive: false });

  base.addEventListener('touchend', () => release());

  // Mouse support (desktop testing)
  base.addEventListener('mousedown', e => { dragging = true; move(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e => { if (dragging) move(e.clientX, e.clientY); });
  window.addEventListener('mouseup', () => { if (dragging) release(); });
}

// Left joystick → throttle (Y axis)
setupJoystick('joystick-left', 'thumb-left', 'left', (nx, ny) => {
  throttle = ny;
  updateThrottleDisplay();
});

// Right joystick → steering (X axis)
setupJoystick('joystick-right', 'thumb-right', 'right', (nx, ny) => {
  steering = nx;
  updateSteeringDisplay();
});

// ── DISPLAY ──
function updateThrottleDisplay() {
  const spd = Math.abs(throttle);
  document.getElementById('t-speed').textContent = spd;
  const dir = document.getElementById('dir-indicator');
  if (throttle > 5) { dir.textContent = '▲'; dir.style.color = 'var(--green)'; }
  else if (throttle < -5) { dir.textContent = '▼'; dir.style.color = 'var(--accent2)'; }
  else { dir.textContent = '●'; dir.style.color = 'var(--accent)'; }
}

function updateSteeringDisplay() {
  const deg = Math.round(steering * 0.45); // -45..45
  document.getElementById('t-steer').textContent = deg + '°';
  // cursor position
  const pct = (steering + 100) / 200 * 100;
  document.getElementById('steering-cursor').style.left = `calc(${pct}% - 6px)`;
}

// ── WEBSOCKET ──
function connect() {
  const ip = document.getElementById('ip-input').value.trim() || '192.168.4.1';
  if (ws) { ws.close(); }
  try {
    ws = new WebSocket(`ws://${ip}/ws`);
    ws.onopen = () => {
      wsConnected = true;
      setStatus('ws', true, 'CONNECTÉ');
      toggleConfig(false);
      startLoop();
    };
    ws.onclose = () => {
      wsConnected = false;
      setStatus('ws', false, 'DÉCONNECTÉ');
      stopLoop();
    };
    ws.onerror = () => {
      wsConnected = false;
      setStatus('ws', false, 'ERREUR');
    };
    ws.onmessage = (e) => {
      const ping = Date.now() - pingStart;
      document.getElementById('t-ping').textContent = ping;
    };
  } catch(err) {
    setStatus('ws', false, 'ERREUR');
  }
}

function setStatus(type, on, label) {
  const dot = document.getElementById('dot-' + type);
  const lbl = document.getElementById('lbl-' + type);
  dot.className = 'dot' + (on ? ' on' : '');
  lbl.className = 'status-label' + (on ? ' on' : '');
  lbl.textContent = label;
}

function sendCmd(key, val) {
  if (!wsConnected || !ws) return;
  const msg = JSON.stringify({ [key]: val });
  ws.send(msg);
}

function sendState() {
  if (!wsConnected || !ws) return;
  pingStart = Date.now();
  const msg = JSON.stringify({ t: throttle, s: steering, m: mode });
  ws.send(msg);
}

function startLoop() {
  if (sendInterval) return;
  sendInterval = setInterval(sendState, 50); // 20Hz
}
function stopLoop() {
  clearInterval(sendInterval);
  sendInterval = null;
}

function emergencyStop() {
  throttle = 0; steering = 0;
  updateThrottleDisplay(); updateSteeringDisplay();
  sendCmd('stop', 1);
  // visual feedback
  document.getElementById('btn-stop').classList.add('pressed');
  setTimeout(() => document.getElementById('btn-stop').classList.remove('pressed'), 300);
}

function cycleMode() {
  modeIdx = (modeIdx + 1) % modes.length;
  mode = modes[modeIdx];
  document.getElementById('t-mode').textContent = mode;
  document.getElementById('mode-display').textContent = mode;
  sendCmd('mode', mode);
}

function toggleConfig(force) {
  const panel = document.getElementById('config-panel');
  const show = force !== undefined ? force : !panel.classList.contains('visible');
  panel.classList.toggle('visible', show);
}

// ── PS4 GAMEPAD API (Android Chrome/Brave fix) ──
let gpConnected = false;
let gpLoop = null;
let circlePrev = false;
let touchUnlocked = false;

// Android Chrome exige un appui tactile avant de donner accès au gamepad
function unlockGamepad() {
  if (!touchUnlocked) {
    touchUnlocked = true;
    startGpScan();
  }
}
document.addEventListener('touchstart', unlockGamepad, { once: true });
document.addEventListener('click', unlockGamepad, { once: true });

// Scan actif toutes les 200ms pour détecter la manette (Android ne fire pas toujours gamepadconnected)
function startGpScan() {
  if (gpLoop) return;
  gpLoop = setInterval(() => {
    const gps = navigator.getGamepads ? Array.from(navigator.getGamepads()).filter(Boolean) : [];
    if (gps.length > 0) {
      if (!gpConnected) {
        gpConnected = true;
        document.getElementById('dot-ps4').className = 'dot on';
        document.getElementById('lbl-ps4').className = 'status-label on';
        document.getElementById('lbl-ps4').textContent = 'PS4 OK';
      }
      pollGamepad(gps[0]);
    } else {
      if (gpConnected) {
        gpConnected = false;
        document.getElementById('dot-ps4').className = 'dot warn';
        document.getElementById('lbl-ps4').className = 'status-label warn';
        document.getElementById('lbl-ps4').textContent = 'PS4 --';
        throttle = 0; steering = 0;
        updateThrottleDisplay(); updateSteeringDisplay();
      }
    }
  }, 50);
}

// Aussi écouter l'événement standard si le navigateur le supporte
window.addEventListener('gamepadconnected', (e) => {
  gpConnected = true;
  document.getElementById('dot-ps4').className = 'dot on';
  document.getElementById('lbl-ps4').className = 'status-label on';
  document.getElementById('lbl-ps4').textContent = 'PS4 OK';
  startGpScan();
});
window.addEventListener('gamepaddisconnected', () => {
  gpConnected = false;
  document.getElementById('dot-ps4').className = 'dot warn';
  document.getElementById('lbl-ps4').className = 'status-label warn';
  document.getElementById('lbl-ps4').textContent = 'PS4 --';
});

function pollGamepad(gp) {
  if (!gp) return;

  // ── Axes PS4 sur Android ──
  // axis[0] = stick gauche X, axis[1] = stick gauche Y (↑ négatif)
  // axis[2] = stick droit  X, axis[3] = stick droit  Y
  // buttons[6] = L2, buttons[7] = R2  (value 0..1)

  const deadzone = 0.12;

  // Gaz/frein via stick gauche Y
  const rawT = -(gp.axes[1] || 0);
  let newThrottle = Math.abs(rawT) > deadzone ? Math.round(rawT * 100) : 0;

  // Direction via stick droit X
  const rawS = gp.axes[2] || 0;
  let newSteering = Math.abs(rawS) > deadzone ? Math.round(rawS * 100) : 0;

  // R2 gaz / L2 frein (priorité sur les sticks si enfoncés)
  const r2 = gp.buttons[7] ? gp.buttons[7].value : 0;
  const l2 = gp.buttons[6] ? gp.buttons[6].value : 0;
  if (r2 > 0.05 || l2 > 0.05) {
    newThrottle = Math.round((r2 - l2) * 100);
  }

  // Direction aussi via stick gauche X si stick droit pas bougé
  if (Math.abs(newSteering) < 5) {
    const rawSL = gp.axes[0] || 0;
    newSteering = Math.abs(rawSL) > deadzone ? Math.round(rawSL * 100) : 0;
  }

  throttle = newThrottle;
  steering = newSteering;

  // Boutons
  // Triangle (btn 3) = STOP
  if (gp.buttons[3]?.pressed) emergencyStop();

  // Rond (btn 1) = changer mode (une seule fois par appui)
  const circleNow = gp.buttons[1]?.pressed || false;
  if (circleNow && !circlePrev) cycleMode();
  circlePrev = circleNow;

  // Croix (btn 0) = klaxon
  if (wsConnected && ws) {
    ws.send(JSON.stringify({ horn: gp.buttons[0]?.pressed ? 1 : 0 }));
  }

  updateThrottleDisplay();
  updateSteeringDisplay();
}

// ── INIT ──
setTimeout(() => toggleConfig(true), 500);
// Lancer le scan tout de suite (certains navigateurs ne bloquent pas)
startGpScan();
</script>
